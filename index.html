	(function () {
  const SELECTORS = [
    '.global-confirm-checkbox-block',
    '.confirm-rules-checkbox',
    'input.global-confirm-checkbox',
    'input[type="checkbox"][name="pdpConfirmCheckbox"]'
  ].join(',');

  function nuke() {
    // 1) снимаем блокировки на самих чекбоксах
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      if (cb.matches('input.global-confirm-checkbox, input[name="pdpConfirmCheckbox"]')) {
        cb.checked = true;
        cb.required = false;
        cb.removeAttribute('required');
        cb.setAttribute('checked', 'checked');
        // на всякий: если проверка на disabled/readonly — не мешаем сабмиту
        cb.disabled = false;
        cb.readOnly = false;
      }
    });

    // 2) удаляем контейнеры, чтобы не “работали” клики/валидация/обвязка
    document.querySelectorAll('.global-confirm-checkbox-block, .confirm-rules-checkbox')
      .forEach(el => el.remove());

    // 3) на крайняк: если ГК вставил только input без контейнера — тоже выпиливаем
    document.querySelectorAll('input.global-confirm-checkbox, input[name="pdpConfirmCheckbox"]')
      .forEach(el => el.remove());
  }

  // старт
  nuke();

  // повтор после полной загрузки
  window.addEventListener('load', nuke);

  // периодически в первые секунды (часто ГК докидывает через таймеры)
  let ticks = 0;
  const timer = setInterval(() => {
    nuke();
    ticks++;
    if (ticks > 40) clearInterval(timer); // ~20 секунд
  }, 500);

  // наблюдаем за любыми вставками в DOM и сразу выпиливаем
  const obs = new MutationObserver((mutations) => {
    for (const m of mutations) {
      for (const node of m.addedNodes || []) {
        if (node.nodeType !== 1) continue;
        // если добавили что-то похожее — чистим
        if (node.matches?.(SELECTORS) || node.querySelector?.(SELECTORS)) {
          nuke();
          return;
        }
      }
    }
  });

<script>
(function () {
  function findSubmit(form) {
    return (
      form.querySelector('button[type="submit"], input[type="submit"], [type="submit"]') ||
      form.querySelector('button, .btn, .button, a.btn')
    );
  }

  function moveCheckboxesInForm(form) {
    if (!form || form.dataset.gcMovedCheckboxes === "1") return;

    const cbs = form.querySelectorAll(".global-confirm-checkbox-block");
    if (!cbs.length) return;

    const submit = findSubmit(form);
    if (!submit) return;

    cbs.forEach(cb => submit.parentNode.insertBefore(cb, submit));
    form.dataset.gcMovedCheckboxes = "1";
  }

  function run() {
    document.querySelectorAll("form").forEach(moveCheckboxesInForm);
  }

  // старт
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", run);
  } else {
    run();
  }

  // на случай динамической подгрузки форм
  const obs = new MutationObserver(run);
  obs.observe(document.documentElement, { childList: true, subtree: true });

  // чтобы не висел вечно
  setTimeout(() => obs.disconnect(), 10000);
})();
</script>
